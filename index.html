html {
    height: 100%;
    overflow: hidden;
}

body {
    width: 100%;
    height: calc(var(--vh, 1vh) * 100);
    overflow: hidden;
    background: var(--bg);
    font-family: 'Segoe UI', system-ui, sans-serif;
    touch-action: none;
    display: flex;
    flex-direction: column;
    -webkit-user-select: none;
    color: var(--text);
}

/* ── Top Bar ── */
#top-bar {
    height: 52px;
    background: var(--surface);
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 16px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    gap: 12px;
}
.top-stat {
    display: flex; align-items: center; gap: 6px;
    font-size: 13px; font-weight: 600; color: var(--muted);
}
.top-stat b { color: var(--text); font-size: 15px; }
#mode-badge {
    font-size: 11px; font-weight: 700; letter-spacing: 1px;
    padding: 3px 10px; border-radius: 20px;
    background: rgba(249,115,22,0.15); color: var(--warning);
    border: 1px solid rgba(249,115,22,0.3);
    transition: all 0.2s;
}
#mode-badge.build { background: rgba(168,85,247,0.15); color: var(--purple); border-color: rgba(168,85,247,0.3); }

/* ── Canvas ── */
#gameCanvas { flex-grow: 1; display: block; width: 100%; background: var(--bg); }

/* ── Bottom Bar ── */
#bottom-bar {
    height: 72px;
    background: var(--surface);
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
    padding: 0 12px;
    padding-bottom: env(safe-area-inset-bottom);
    border-top: 1px solid var(--border);
}

/* ── Buttons ── */
.btn {
    padding: 9px 14px; border: none; border-radius: 10px;
    color: white; cursor: pointer; font-weight: 700;
    font-size: 12px; letter-spacing: 0.5px;
    transition: opacity 0.15s, transform 0.1s;
    min-width: 64px; white-space: nowrap;
}
.btn:active { transform: scale(0.95); opacity: 0.85; }
.btn-primary  { background: var(--primary); }
.btn-accent   { background: var(--accent); }
.btn-danger   { background: var(--danger); }
.btn-warning  { background: var(--warning); }
.btn-purple   { background: var(--purple); }
.btn-surface  { background: var(--surface2); border: 1px solid var(--border); }
.btn-build    { background: #e91e63; }
.btn-confirm  { background: var(--accent); }
.btn-cancel   { background: var(--danger); }
.btn-action   { background: var(--warning); }
.btn-sm       { padding: 6px 10px; font-size: 11px; min-width: 0; }
.btn-block    { width: 100%; margin-top: 8px; }

/* ── Modals ── */
.modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.6); z-index: 190;
}
.modal-overlay.open { display: block; }
.modal-box {
    position: fixed; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 200; width: 92%; max-width: 400px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    box-shadow: 0 25px 60px rgba(0,0,0,0.5);
}
.modal-title {
    font-size: 17px; font-weight: 700; margin-bottom: 16px;
    display: flex; align-items: center; gap: 8px;
}
.modal-section {
    background: var(--surface2); border-radius: 10px;
    padding: 12px 14px; margin-bottom: 10px;
}
.modal-section-title {
    font-size: 10px; font-weight: 700; letter-spacing: 1.5px;
    color: var(--muted); text-transform: uppercase; margin-bottom: 8px;
}
.modal-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 4px 0; font-size: 13px; gap: 8px;
}
.modal-row .label { color: var(--muted); }
.modal-row .value { font-weight: 600; }
.worker-task-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
}
.task-btn {
    padding: 10px 8px; border-radius: 10px; border: 2px solid transparent;
    background: var(--bg); cursor: pointer; color: var(--muted);
    font-size: 11px; font-weight: 700; text-align: center;
    transition: all 0.15s;
}
.task-btn .task-icon { font-size: 20px; display: block; margin-bottom: 4px; }
.task-btn:hover { border-color: var(--border); color: var(--text); }
.task-btn.active { border-color: var(--primary); color: var(--primary); background: rgba(59,130,246,0.1); }
.divider { border: none; border-top: 1px solid var(--border); margin: 12px 0; }

/* ── Build confirm ── */
#build-confirm {
    display: none; position: fixed;
    bottom: 82px; left: 50%; transform: translateX(-50%);

    padding: 10px 16px; border-radius: 12px;

}

#scratch-canvas {

<script src="camera.js"></script>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

window.oncontextmenu = (e) => e.preventDefault();

let TILE = 40;
let COLS = 15;
let ROWS = 12;
let offX = 0, offY = 0;

let doorXStart = 0; 
let doorXEnd = 0;

let lastTime = 0;
let transactionTimer = 0;
let restockTimer = 0;

let crateCost = 50;

let gameState = {
    money: 500, moneyTexts: [],
    mode: 'PLAY',
    roomRows: 8,  // expandable
    player: { x: 400, y: 500, tX: 400, tY: 500, size: 15, angle: 0, speed: 200, holding: 0, maxHolding: 50, path: [] },
    worker: null, // null = not hired
    counter: { gridX: 1, gridY: 4, w: 1, h: 3, type: 'counter', isDragging: false },
    shelves: [{ gridX: 7, gridY: 3, w: 1, h: 4, stock: 50, max: 100, type: 'shelf', isDragging: false }],
    customers: [],
    deliveries: [],
    movingObj: null, isPlaced: false, tempPos: { gX: 0, gY: 0 }, mouse: { x: 0, y: 0 }
};

// --- New Scratcher Variables ---
const sCanvas = document.getElementById('scratch-canvas');
const sCtx = sCanvas.getContext('2d');
let scratchActive = false;
let isScratching = false;
let lastX = null, lastY = null;
let scratchCooldown = 5.0; // Prevents the shelf from "spamming" cards
const symbols = ['🍒', '💎', '🍋', '⭐', '🔔']; // Symbols from your scratcher file
let currentPendingWin = 0;

function getRect(obj) { return { x: offX + obj.gridX * TILE, y: offY + obj.gridY * TILE, w: obj.w * TILE, h: obj.h * TILE }; }
function isInZone(px, py, zone) { return px > zone.x && px < zone.x + zone.w && py > zone.y && py < zone.y + zone.h; }


// Initialize Camera from the camera.js file
Camera.init(canvas);



function checkCollision(nx, ny, isAI = false) {
    const doorMargin = 5; // Extra wiggle room to get through the door
    const isInDoorWidth = (nx > doorXStart + doorMargin && nx < doorXEnd - doorMargin);
    
    // 1. TOP WALL & DOOR LOGIC
    // If we are on the sidewalk (above the shop)
    if (ny < offY) {
        // AI can move freely on the sidewalk to reach the door
        if (isAI) return false; 
        
        // Player can move on sidewalk but not off-screen
        if (nx < 0 || nx > canvas.width || ny < 0) return true;
        
        // Player can only ENTER the shop through the door
        const isInDoor = (nx > doorXStart && nx < doorXEnd);
        if (ny > offY - 10 && !isInDoor) return true; 
        
        // If NOT in door width, the top wall (offY) is solid
        return false; 
    }

    // 2. BOTTOM & SIDE WALLS
    // Stay inside offX, offX + Width, and offY + Height
    if (nx < offX + 15 || nx > offX + (COLS * TILE) - 15 || 
        ny > offY + (ROWS * TILE) - 15) {
        return true;
    }
    
    // 3. FURNITURE COLLISION
    let collision = false;
    [gameState.counter, ...gameState.shelves].forEach(obj => {
        if (gameState.movingObj === obj) return; 
        const r = getRect(obj);
        if (nx + 12 > r.x && nx - 12 < r.x + r.w && ny + 12 > r.y && ny - 12 < r.y + r.h) {
            collision = true;
        }
    });
    return collision;
}

function buyStock() {
    if (gameState.money >= crateCost) {
        gameState.money -= crateCost; 
        // We calculate position relative to the shop's origin (offX)
        // (1.5 + random) means it lands near the door
        gameState.deliveries.push({ 
            gX: 1.5 + Math.random() * 2, 
            gY: -1.5, // On the sidewalk above the shop
            qty: 50 
        });
        saveGame();
    }
}

function spawnCustomer() {
    if (gameState.mode !== 'PLAY') return;

    // Only limit the number of people INSIDE the shop (those with a SHOPPER intent)
    const activeShoppers = gameState.customers.filter(c => c.intent === 'SHOPPER').length;
    if (activeShoppers >= 8) return; 

    const side = Math.random() > 0.5 ? -100 : canvas.width + 100;
    const sidewalkY = offY - 40; 
    
    // DECISION LOGIC: 60% chance to be a shopper, 40% just walking by
    const isShopper = Math.random() < 0.6;
    const intent = isShopper ? 'SHOPPER' : 'PASSERBY';

    // Shoppers target the door, Passerbys target the opposite side of the screen
    const targetX = isShopper ? (doorXStart + doorXEnd) / 2 : (side < 0 ? canvas.width + 200 : -200);

    const newCustomer = {
        id: Math.random().toFixed(4), 
        x: side, 
        y: sidewalkY, 
        tX: targetX, 
        tY: sidewalkY, 
        relX: ((doorXStart + doorXEnd) / 2 - offX) / TILE,
        relY: (offY - 20 - offY) / TILE,
        intent: intent, // Store the intent
        speed: 70 + Math.random() * 30, 
        state: 'WALKING', 
        basket: 0, 
        timer: 0, 
        queueTime: Date.now(),
        color: isShopper ? `hsl(${Math.random() * 360}, 65%, 60%)` : '#888' // Gray out non-shoppers?
    };

    gameState.customers.push(newCustomer);
    saveGame();
    console.log(`Customer ${newCustomer.id} spawned at X:${side}. Targeting Door X:${targetX}`);
}

function updateCustomers(dt) {
    let p = gameState.player;
    if (gameState.mode !== 'PLAY') return;

    // Line management for both shelf and register
    const shelfQueue = gameState.customers
        .filter(c => c.state === 'TO_SHELF' || c.state === 'PICKING')
        .sort((a,b) => a.queueTime - b.queueTime);

    // 1. Define who is in the payment line
    const payQueue = gameState.customers
        .filter(c => c.state === 'WAITING')
        .sort((a, b) => a.queueTime - b.queueTime);
    
    // 2. Define the player interaction zone (the red dotted box area)
    const regZone = {
        x: offX + (gameState.counter.gridX - 1) * TILE,
        y: offY + gameState.counter.gridY * TILE,
        w: TILE, h: gameState.counter.h * TILE
    };

    // 3. Process the transaction — player OR worker in zone qualifies
    const workerInZone = gameState.worker && isInZone(gameState.worker.x, gameState.worker.y, regZone);
    if (payQueue.length > 0 && (isInZone(gameState.player.x, gameState.player.y, regZone) || workerInZone)) {
        const firstC = payQueue[0];
        
        // Ensure the customer has actually reached their destination at the counter
        const distToCounter = Math.hypot(firstC.x - firstC.tX, firstC.y - firstC.tY);
        
        if (distToCounter < 30) {
            transactionTimer += dt;
            
            if (transactionTimer >= 1.5) {
                const earnings = firstC.basket * 10;
                gameState.money += earnings;

                // Floating Money Text
                if (!gameState.moneyTexts) gameState.moneyTexts = [];
                gameState.moneyTexts.push({
                    x: gameState.player.x,
                    y: gameState.player.y - 20,
                    val: `+$${earnings}`,
                    life: 1.0,
                    opacity: 1.0
                });

                firstC.basket = 0; 
                firstC.state = 'LEAVING';
                transactionTimer = 0; 
                saveGame();
            }
        }
    } else {
        transactionTimer = 0; // Reset if player walks away
        // Reset state to WAITING if the player walks away before finishing
        payQueue.forEach(c => { if(c.state === 'PAYING') c.state = 'WAITING'; });
    }

    gameState.customers.forEach((c, index) => {
        if (c.state === 'WALKING') {
    // Only transition to 'ENTERING' if they intended to shop
    if (c.intent === 'SHOPPER' && Math.abs(c.x - c.tX) < 10) { 
        c.state = 'ENTERING'; 
        c.tY = offY + TILE * 1.5; 
    } 
    // If they are a PASSERBY and reached the other side, remove them
    else if (c.intent === 'PASSERBY' && Math.abs(c.x - c.tX) < 20) {
        const index = gameState.customers.indexOf(c);
        gameState.customers.splice(index, 1);
    }
}
        else if (c.state === 'ENTERING') {
    // Once they pass the door threshold, head to the shelves
    if (c.y > offY + 10) {
        c.state = 'TO_SHELF';
        c.queueTime = Date.now();
        // Pick the best shelf: prefer one with stock, break ties randomly
        const stocked = gameState.shelves.filter(s => s.stock > 0);
        const pool = stocked.length > 0 ? stocked : gameState.shelves;
        c.targetShelf = pool[Math.floor(Math.random() * pool.length)];
    }
} 
        else if (c.state === 'TO_SHELF') {
            // Use the shelf assigned when they entered; fall back to first if missing (old save data)
            const shelf = c.targetShelf || gameState.shelves[0];

            // Queue only among customers going to the SAME shelf
            const shelfQueue = gameState.customers
                .filter(cust => (cust.state === 'TO_SHELF' || cust.state === 'PICKING') && cust.targetShelf === shelf)
                .sort((a, b) => a.queueTime - b.queueTime);
            
            const pos = shelfQueue.indexOf(c);

            // Approach from the left at mid-shelf height; queue members spread downward
            const shelfMidY = offY + (shelf.gridY + shelf.h / 2) * TILE;
            c.tX = offX + (shelf.gridX - 0.8) * TILE;
            c.tY = shelfMidY + (pos * 38);

            const dist = Math.hypot(c.x - c.tX, c.y - c.tY);
            
            // CRITICAL: Only index 0 of this shelf's queue can pick
            if (pos === 0 && dist < 20) {
                c.state = 'PICKING';
                c.timer = 1.5;
            }
        }
        else if (c.state === 'PICKING') {
            c.timer -= dt;
            if (c.timer <= 0) {
                const s = c.targetShelf || gameState.shelves[0];
                if (s.stock > 0) {
                    // Success: Customer finds tickets
                    const grab = Math.min(s.stock, Math.floor(Math.random() * 3) + 1);
                    s.stock -= grab;
                    c.basket = grab;
                    c.state = 'WAITING';
                    c.queueTime = Date.now();
                } else {
                    // Failure: No tickets left!
                    c.state = 'ANGRY'; // New state
                    c.timer = 2.0;    // Stay angry for 2 seconds before leaving
                }
                saveGame();
            }
        }
        else if (c.state === 'ANGRY') {
            c.timer -= dt;
            // Target the door to leave
            c.tX = (doorXStart + doorXEnd) / 2;
            c.tY = offY - 20;

            if (c.timer <= 0) {
                c.state = 'LEAVING';
            }
        } 
        else if (c.state === 'WAITING') {
    // ONLY people currently waiting for the register
    const payQueue = gameState.customers
        .filter(cust => cust.state === 'WAITING')
        .sort((a, b) => a.queueTime - b.queueTime);
    
    const pos = payQueue.indexOf(c);
    // Line up horizontally to the right of the counter
    c.tX = offX + (gameState.counter.gridX + gameState.counter.w) * TILE + 20 + (pos * 40);
    c.tY = offY + (gameState.counter.gridY + 1.5) * TILE;
} 
        else if (c.state === 'LEAVING') {
    if (c.y > offY - 10) { 
        // Move to door center first
        c.tX = (doorXStart + doorXEnd) / 2; 
        c.tY = offY - 40; 
    } else { 
        // Head off-screen once on sidewalk
        c.tX = (c.id > 0.5) ? -200 : canvas.width + 200; 
        c.tY = offY - 40;
    }
}

        let dx = c.tX - c.x, dy = c.tY - c.y;
        let dist = Math.sqrt(dx*dx + dy*dy);
        if (dist > 3) {
            let vx = (dx/dist) * c.speed * dt, vy = (dy/dist) * c.speed * dt;
            if (!checkCollision(c.x + vx, c.y, true)) c.x += vx;
            if (!checkCollision(c.x, c.y + vy, true)) c.y += vy;

            c.relX = (c.x - offX) / TILE;
            c.relY = (c.y - offY) / TILE;
        }

        if ((c.x < -150 || c.x > canvas.width + 150) && c.state === 'LEAVING') {
            gameState.customers.splice(index, 1);
        }
    });
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    // 2. START THE SANDWICH (Everything inside moves with the camera)
    Camera.apply(ctx, canvas);

    // Draw the store background/floor
    //drawStore();
    let p = gameState.player;

    ctx.strokeStyle = "#444";
    ctx.lineWidth = 2;
    for(let i=0; i < canvas.width; i += 100) { 
        ctx.beginPath(); 
        ctx.moveTo(i, offY - 80); 
        ctx.lineTo(i, offY); 
        ctx.stroke(); 
    }
    
   // Draw the Floor (Centered Grid)
    ctx.fillStyle = "#1e1e1e"; 
    ctx.fillRect(offX, offY, COLS * TILE, ROWS * TILE);

    // Draw Dynamic Walls (White Border)
    ctx.strokeStyle = "white"; 
    ctx.lineWidth = 4; 
    ctx.strokeRect(offX, offY, COLS * TILE, ROWS * TILE);

    // Draw the Entrance (Doorway)
    // This stays relative to the top-left of your dynamic room
    ctx.fillStyle = "#1e1e1e"; 
    ctx.fillRect(offX + TILE * 1, offY - 8, TILE * 3, 16);
    
    if (gameState.mode === 'BUILD') {
        ctx.strokeStyle = "#333";
        for(let i=0; i<=COLS; i++) { ctx.beginPath(); ctx.moveTo(offX+i*TILE, offY); ctx.lineTo(offX+i*TILE, offY+ROWS*TILE); ctx.stroke(); }
        for(let j=0; j<=ROWS; j++) { ctx.beginPath(); ctx.moveTo(offX, offY+j*TILE); ctx.lineTo(offX+COLS*TILE, offY+j*TILE); ctx.stroke(); }
    }

    ctx.setLineDash([5, 5]); ctx.lineWidth = 2;
    ctx.strokeRect(offX + (gameState.counter.gridX - 1) * TILE + 5, offY + gameState.counter.gridY * TILE + 5, TILE - 10, (gameState.counter.h * TILE) - 10);
    // DYNAMIC RED DOTTED HITBOX
    // 1. Determine the zone position (following the counter)
    let rx, ry;
    if (gameState.movingObj === gameState.counter && !gameState.isPlaced) {
        rx = offX + (Math.floor((gameState.mouse.x - offX) / TILE) - 1) * TILE;

    } else {
        rx = offX + (gameState.counter.gridX - 1) * TILE;

    }

    // 2. Define the collision area for the player
    const rw = TILE;
    const rh = gameState.counter.h * TILE;

    // 3. Check if player is inside
    const isPlayerInside = (gameState.player.x > rx && gameState.player.x < rx + rw && 
                            gameState.player.y > ry && gameState.player.y < ry + rh);

    // 4. Set color: Green if player is inside, Red otherwise
    ctx.strokeStyle = isPlayerInside ? "rgba(76, 175, 80, 0.9)" : "rgba(255, 0, 0, 0.7)"; 
    
    ctx.strokeRect(rx + 5, ry + 5, rw - 10, rh - 10);
    if (isPlayerInside) {
        ctx.fillStyle = "rgba(76, 175, 80, 0.1)";

    }
    ctx.setLineDash([]);

    gameState.deliveries.forEach(d => {

        ctx.textAlign = "center";
        ctx.fillText(d.qty, drawX + fixedSize/2, drawY + fixedSize/2 + 4); 
    });

    [gameState.counter, ...gameState.shelves].forEach(obj => {
        if (gameState.movingObj === obj) return;
        // Counter
        if (obj.type === 'counter') {
            ctx.fillStyle = "#4a3728"; ctx.fillRect(offX + obj.gridX * TILE, offY + obj.gridY * TILE, obj.w * TILE, obj.h * TILE);
            ctx.strokeStyle = "#8B6914"; ctx.lineWidth = 2;
            ctx.strokeRect(offX + obj.gridX * TILE, offY + obj.gridY * TILE, obj.w * TILE, obj.h * TILE);
            ctx.fillStyle = "#f97316"; ctx.font = "bold 9px Arial"; ctx.textAlign = "center";
            ctx.fillText("REG", offX + obj.gridX * TILE + obj.w * TILE / 2, offY + obj.gridY * TILE + obj.h * TILE / 2 + 3);
        } else {
            // Shelf — draw with fill bar
            ctx.fillStyle = "#374151"; ctx.fillRect(offX + obj.gridX * TILE, offY + obj.gridY * TILE, obj.w * TILE, obj.h * TILE);
            ctx.strokeStyle = "#6b7280"; ctx.lineWidth = 2;
            ctx.strokeRect(offX + obj.gridX * TILE, offY + obj.gridY * TILE, obj.w * TILE, obj.h * TILE);
            // Stock fill bar
            const fillH = (obj.stock / obj.max) * (obj.h * TILE - 4);
            ctx.fillStyle = obj.stock > 20 ? "rgba(34,197,94,0.3)" : "rgba(239,68,68,0.3)";
            ctx.fillRect(offX + obj.gridX * TILE + 2, offY + obj.gridY * TILE + (obj.h * TILE - 2) - fillH, obj.w * TILE - 4, fillH);
            // Label
            ctx.fillStyle = obj.stock > 0 ? "white" : "#ef4444";
            ctx.font = "bold 9px Arial"; ctx.textAlign = "center";
            ctx.fillText(obj.stock > 0 ? `${obj.stock}` : "EMPTY", offX + obj.gridX * TILE + obj.w * TILE / 2, offY + obj.gridY * TILE - 4);
        }
    });

    if (gameState.movingObj) {
    // If we haven't clicked to set a 'temp' spot yet, follow the mouse exactly
    // Otherwise, show the ghost at the potential placement spot (tempPos)
    let gx = gameState.isPlaced ? gameState.tempPos.gX : Math.floor((gameState.mouse.x - offX) / TILE);
    let gy = gameState.isPlaced ? gameState.tempPos.gY : Math.floor((gameState.mouse.y - offY) / TILE);

    ctx.save();
    ctx.globalAlpha = 0.4;
    
    // Check if the current position is valid
    const blocksDoor = (gx < 5 && gy < 3);
    const oob = (gx < 0 || gx + gameState.movingObj.w > COLS || gy < 0 || gy + gameState.movingObj.h > ROWS || blocksDoor);
    
    // Draw the ghost box
    ctx.fillStyle = oob ? "red" : "cyan";
    ctx.fillRect(offX + gx * TILE, offY + gy * TILE, gameState.movingObj.w * TILE, gameState.movingObj.h * TILE);
    
    // Draw the actual object texture/color as a ghost too so you can see it
    ctx.fillStyle = "#555";
    ctx.fillRect(offX + gx * TILE + 2, offY + gy * TILE + 2, (gameState.movingObj.w * TILE) - 4, (gameState.movingObj.h * TILE) - 4);
    
    ctx.restore();
}

    ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.angle);
    ctx.fillStyle = '#2196F3'; ctx.beginPath(); ctx.arc(0,0,p.size,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = 'white'; ctx.beginPath(); ctx.arc(7,0,4,0,Math.PI*2); ctx.fill();
    ctx.restore();
    if (p.holding > 0) { 
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.angle);
    
        // Draw the held box
        ctx.fillStyle = "#d2b48c"; 
        ctx.fillRect(10, -8, 16, 16); 
        ctx.strokeStyle = "#8b4513";
        ctx.strokeRect(10, -8, 16, 16);
    
        // Draw the number, but un-rotate it so it stays upright
        ctx.rotate(-p.angle); 
        ctx.fillStyle = "white";
        ctx.font = "bold 10px Arial";
        ctx.textAlign = "center";
        // We adjust the X/Y slightly because we are still in the player's translated space
        const textX = Math.cos(p.angle) * 18;
        const textY = Math.sin(p.angle) * 18 + 4;
        ctx.fillText(p.holding, textX, textY);

        ctx.restore();
    } // end of holding box

    // Draw Worker (if hired)
    if (gameState.worker) {
        const w = gameState.worker;
        ctx.save();
        ctx.translate(w.x, w.y);
        ctx.rotate(w.angle);
        // Body
        ctx.fillStyle = '#22c55e';
        ctx.beginPath(); ctx.arc(0, 0, 13, 0, Math.PI * 2); ctx.fill();
        // Eye dot
        ctx.fillStyle = 'white';
        ctx.beginPath(); ctx.arc(6, 0, 3, 0, Math.PI * 2); ctx.fill();
        ctx.restore();
        // Worker held box
        if (w.holding > 0) {
            ctx.save(); ctx.translate(w.x, w.y); ctx.rotate(w.angle);
            ctx.fillStyle = "#d2b48c"; ctx.fillRect(10, -6, 12, 12);
            ctx.strokeStyle = "#8b4513"; ctx.strokeRect(10, -6, 12, 12);
            ctx.rotate(-w.angle);
            ctx.fillStyle = "white"; ctx.font = "bold 9px Arial"; ctx.textAlign = "center";
            ctx.fillText(w.holding, Math.cos(w.angle) * 16, Math.sin(w.angle) * 16 + 3);
            ctx.restore();
        }
        // Task emote
        const wEmote = { 'MANNING_REGISTER': '🧾', 'STOCKING': '📦', 'FETCHING_CRATE': '🚶', 'IDLE': '☕' }[w.task] || '';
        if (wEmote) {
            ctx.font = "14px Arial"; ctx.textAlign = "center";
            ctx.fillText(wEmote, w.x, w.y - 22);
        }
    }

// 4. DRAW CUSTOMERS (Must be after environment)
    gameState.customers.forEach(c => {
        ctx.fillStyle = c.color; 
        ctx.beginPath(); 
        ctx.arc(c.x, c.y, 14, 0, Math.PI*2); 
        ctx.fill();

        // Floating Emotes
        let emote = "";
        if (c.state === 'TO_SHELF' || c.state === 'PICKING') emote = "🛒";
        if (c.state === 'WAITING' || c.state === 'PAYING') emote = "💰";
        if (c.state === 'LEAVING') emote = "👋";
        if (c.state === 'ANGRY') emote = "😡"; 

        if (emote) {
            ctx.font = "18px Arial";
            ctx.textAlign = "center";
            // Add a frantic shake if they are angry
            const shake = (c.state === 'ANGRY') ? Math.sin(Date.now() * 0.05) * 3 : 0;
            ctx.fillText(emote, c.x + shake, c.y - 30);
        }

        // Draw Quantity inside body
        if (c.basket > 0) {
            ctx.fillStyle = "white";
            ctx.font = "bold 12px Arial";
            ctx.fillText(`x${c.basket}`, c.x, c.y + 5);
        }
    });

    // Draw Customer Path Targets
    //gameState.customers.forEach(c => {
    //    ctx.strokeStyle = "yellow";
    //    ctx.beginPath();
    //    ctx.moveTo(c.x, c.y);
    //    ctx.lineTo(c.tX, c.tY);
    //    ctx.stroke();
    //
    //    ctx.fillStyle = "white";
    //    ctx.font = "10px Arial";
    //   ctx.fillText(c.state, c.x, c.y - 20);
    // });

    if (transactionTimer > 0) {
        // Draw bar above whoever is processing — worker if manning register, else player
        const w = gameState.worker;
        const workerProcessing = w && w.task === 'MANNING_REGISTER';
        const barX = workerProcessing
            ? offX + (gameState.counter.gridX - 1) * TILE + TILE / 2
            : p.x;
        const barY = workerProcessing
            ? offY + gameState.counter.gridY * TILE - 10
            : p.y - 30;
        ctx.fillStyle = "rgba(0,0,0,0.5)"; ctx.fillRect(barX - 20, barY, 40, 6);
        ctx.fillStyle = "#4CAF50";         ctx.fillRect(barX - 20, barY, (transactionTimer / 1.5) * 40, 6);
    }
    
    document.getElementById('ui-cash').innerText = `$${gameState.money}`;
    document.getElementById('ui-held').innerText = p.holding;

    // Draw Floating Money Labels
    gameState.moneyTexts.forEach(mt => {
        ctx.globalAlpha = mt.opacity;
        ctx.fillStyle = "#4CAF50";
        ctx.font = "bold 20px Arial";
        ctx.textAlign = "center";
        ctx.fillText(mt.val, mt.x, mt.y);
        ctx.globalAlpha = 1.0;
    });

    Camera.detach(ctx);
    // 3. END THE SANDWICH (Everything after this stays fixed on the screen)
}

function loop(timestamp) {
    //if (!p) return; // Safety check
    let p = gameState.player;

    // --- MOVEMENT ENGINE ---
    // Calculate how far we are from the target
    const dx = (p.targetX || p.x) - p.x;
    const dy = (p.targetY || p.y) - p.y;
    const distance = Math.sqrt(dx * dx + dy * dy);
    let dt = (timestamp - lastTime) / 1000;
    if (dt > 0.1) dt = 0.1; lastTime = timestamp;

    if (scratchCooldown > 0) scratchCooldown -= dt; 

    
    if (gameState.mode === 'PLAY') {
        // 1. If we have a path, the path dictates the target (tX, tY)
    if (p.path && p.path.length > 0) {
        const nextNode = p.path[0];
        p.tX = offX + (nextNode.x + 0.5) * TILE;
        p.tY = offY + (nextNode.y + 0.5) * TILE;

        const distToNode = Math.hypot(p.x - p.tX, p.y - p.tY);
        if (distToNode < 8) {
            p.path.shift(); // Move to the next node
            if (p.path.length === 0) {
                // Snap to final position to prevent shivering
                p.x = p.tX; p.y = p.tY;
            }
        }
    }

    // 2. Perform the actual movement toward tX, tY
    let dx = p.tX - p.x;
    let dy = p.tY - p.y;
    let dist = Math.sqrt(dx * dx + dy * dy);

    if (dist > 2) { // Minimal threshold
        let vx = (dx / dist) * p.speed * dt;
        let vy = (dy / dist) * p.speed * dt;
        
        if (!checkCollision(p.x + vx, p.y)) p.x += vx;
        if (!checkCollision(p.x, p.y + vy)) p.y += vy;
        
        p.angle = Math.atan2(dy, dx);
    }
        
        
        // Interaction Logic — check all shelves for restocking and scratch availability
        const scratchBtn = document.getElementById('btn-scratch');
        let nearAnyShelf = false;
        let restockingShelf = null;

        gameState.shelves.forEach(s => {
            const shelfZone = {
                x: offX + (s.gridX - 1) * TILE,
                y: offY + s.gridY * TILE,
                w: TILE,
                h: s.h * TILE
            };
            if (isInZone(p.x, p.y, shelfZone)) {
                nearAnyShelf = true;
                if (p.holding > 0 && s.stock < s.max) {
                    restockingShelf = s;
                }
            }
        });

        if (restockingShelf) {
            scratchBtn.style.display = 'none';
            restockTimer += dt;
            if (restockTimer > 0.05) {
                restockingShelf.stock++;
                p.holding--;
                restockTimer = 0;
                if (p.holding === 0 || restockingShelf.stock >= restockingShelf.max) saveGame();
            }
        } else if (nearAnyShelf && p.holding === 0) {
            // Show SCRATCH if any nearby shelf has stock
            const anyStocked = gameState.shelves.some(s => {
                const shelfZone = { x: offX + (s.gridX - 1) * TILE, y: offY + s.gridY * TILE, w: TILE, h: s.h * TILE };
                return isInZone(p.x, p.y, shelfZone) && s.stock > 0;
            });
            scratchBtn.style.display = (anyStocked && !scratchActive) ? 'block' : 'none';
        } else {
            scratchBtn.style.display = 'none';
            restockTimer = 0;
        }

        // PICKUP button: show on mobile when a crate is within reach and player isn't already holding max
        const pickupBtn = document.getElementById('btn-pickup');
        const nearCrate = gameState.deliveries.some(d => {
            const crateX = offX + (d.gX * TILE);
            const crateY = offY + (d.gY * TILE);
            return Math.hypot(p.x - crateX, p.y - crateY) < TILE * 1.5;
        });
        // Show PICKUP when near a crate, or DROP when already holding something
        if (p.holding > 0) {
            pickupBtn.textContent = 'DROP';
            pickupBtn.style.display = 'block';
        } else if (nearCrate && p.holding < p.maxHolding) {
            pickupBtn.textContent = 'PICKUP';
            pickupBtn.style.display = 'block';
        } else {
            pickupBtn.style.display = 'none';
        }
    } 

    // Update Floating Money Texts
    for (let i = gameState.moneyTexts.length - 1; i >= 0; i--) {
        let mt = gameState.moneyTexts[i];
        mt.y -= 40 * dt;    
        mt.life -= dt;      
        mt.opacity = mt.life;
        if (mt.life <= 0) gameState.moneyTexts.splice(i, 1);
    }

    updateCustomers(dt);
    updateWorker(dt);
    draw();
    requestAnimationFrame(loop); 
} 

// Utility and Handlers
function saveGame() { localStorage.setItem('scratcherSimData', JSON.stringify({money: gameState.money, customers: gameState.customers, player: gameState.player, counter: gameState.counter, shelves: gameState.shelves, deliveries: gameState.deliveries, worker: gameState.worker, roomRows: gameState.roomRows})); }
function loadGame() {
    const saved = localStorage.getItem('scratcherSimData');
    if (saved) {
        const loaded = JSON.parse(saved);

        // gameState = data;
        const p = gameState.player;
        
        // This stops them from walking to (0,0) or jumping when the game loads
        p.targetX = p.x;
        p.targetY = p.y;
        
        // Camera is always anchored to canvas center — resize() will re-apply this,
        // but set it here too so the first draw frame is correct.
        Camera.x = canvas.width / 2;
        Camera.y = canvas.height / 2;
        
        // Restore basic stats
        gameState.money = loaded.money ?? 500;
        if (loaded.roomRows) gameState.roomRows = loaded.roomRows;
        if (loaded.counter) gameState.counter = loaded.counter;
        if (loaded.shelves) gameState.shelves = loaded.shelves;
        if (loaded.deliveries) gameState.deliveries = loaded.deliveries;
        if (loaded.worker) gameState.worker = loaded.worker;
        if (loaded.player) {
            // Restore the basic stats
            Object.assign(gameState.player, loaded.player);
            
            // If they have a saved relative position, snap them to it
            if (loaded.player.relX !== undefined) {
                gameState.player.x = offX + (loaded.player.relX * TILE);
                gameState.player.y = offY + (loaded.player.relY * TILE);
                gameState.player.tX = gameState.player.x;
                gameState.player.tY = gameState.player.y;
            }
        }

        // RESTORE CUSTOMERS
        if (loaded.customers) {
            gameState.customers = loaded.customers.map(c => {
                // Re-calculate screen X/Y based on the saved relative grid position
                // This prevents them from being 'stuck' if you resized the window
                c.x = offX + (c.relX * TILE);
                c.y = offY + (c.relY * TILE);
                
                // Ensure they have a queueTime so the line order doesn't break
                if (!c.queueTime) c.queueTime = Date.now();
                
                return c;
            });
        }
        // Ensure all customers have a queueTime so line order doesn't break
        if (gameState.customers) {
            gameState.customers.forEach(c => {
                if (!c.queueTime) c.queueTime = Date.now();
            });
        }
    }
}

// 1. Fix for Mobile Viewport Height
function updateVH() {
    let vh = window.innerHeight * 0.01;
    document.documentElement.style.setProperty('--vh', `${vh}px`);
}

window.addEventListener('resize', () => {
    updateVH();
    resize();
});
window.addEventListener('orientationchange', () => {
    setTimeout(() => { updateVH(); resize(); }, 100);
});

// Initial call
updateVH();

function resize() {
    const topBarH = document.getElementById('top-bar').offsetHeight;
    const bottomBarH = document.getElementById('bottom-bar').offsetHeight;
    
    // CAPTURE OLD VALUES FIRST
    const oldOffX = offX;
    const oldOffY = offY;
    const oldTile = TILE;

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight - (topBarH + bottomBarH);

    // FIX: Define a fixed internal room size so no one has a "larger" room
    const INTERNAL_COLS = 12;
    const INTERNAL_ROWS = gameState.roomRows; // expandable via Office

    // 2. NEW RELATIVE CALCULATION: 
    // This makes sure 15 columns and 12 rows ALWAYS fit the screen.
    const tileW = Math.floor(canvas.width / (INTERNAL_COLS + 2)); 
    const tileH = Math.floor((canvas.height - 100) / INTERNAL_ROWS);
    TILE = Math.min(tileW, tileH);
    
    // Clamp TILE size so it doesn't get ridiculously tiny or huge
    if (TILE < 35) TILE = 35;
    if (TILE > 60) TILE = 60;

    // 3. SET THE GRID: These are now the fixed internal bounds
    COLS = INTERNAL_COLS;
    ROWS = INTERNAL_ROWS;

    // 4. ALIGNMENT: Centers the shop and respects the sidewalk/road
    offX = (canvas.width - (COLS * TILE)) / 2;
    offY = Math.max(100, (canvas.height - (ROWS * TILE)) / 2 + 30);

    // Global Door Position for AI and Collision
    doorXStart = offX + TILE * 1;
    doorXEnd = offX + TILE * 4;

    // Reset camera so world coords = canvas pixel coords (camera at canvas center).
    // This must happen every resize — it is the foundation of the coordinate system.
    Camera.x = canvas.width / 2;
    Camera.y = canvas.height / 2;

    // Player repositioning: use saved relative grid position, or spawn inside the shop
    // on first load (before any save data exists).
    if (gameState.player.relX !== undefined) {
        gameState.player.x = offX + (gameState.player.relX * TILE);
        gameState.player.y = offY + (gameState.player.relY * TILE);
    } else {
        // First-time spawn: place to the right of the counter, vertically centred on it
        gameState.player.x = offX + (gameState.counter.gridX + gameState.counter.w + 0.5) * TILE;
        gameState.player.y = offY + (gameState.counter.gridY + gameState.counter.h / 2) * TILE;
    }
    gameState.player.tX = gameState.player.x;
    gameState.player.tY = gameState.player.y;

    // Re-anchor worker if hired
    if (gameState.worker && gameState.worker.relX !== undefined) {
        gameState.worker.x = offX + (gameState.worker.relX * TILE);
        gameState.worker.y = offY + (gameState.worker.relY * TILE);
        gameState.worker.tX = gameState.worker.x;
        gameState.worker.tY = gameState.worker.y;
    }

    // RE-ANCHOR DELIVERY CRATES
    if (gameState.deliveries) {
        gameState.deliveries.forEach(crate => {
            // 1. Calculate how many TILEs away from the OLD origin it was
            const relX = (crate.x - oldOffX) / oldTile;
            const relY = (crate.y - oldOffY) / oldTile;

            // 2. Snap to the NEW pixel position based on the new origin and TILE size
            crate.x = offX + (relX * TILE);
            crate.y = offY + (relY * TILE);
            
            // 3. Update the crate's internal "size" so it scales visually
            // (Assuming your crates use a standard TILE-based width/height)
            crate.w = TILE * 0.8; 
            crate.h = TILE * 0.8;
        });
    }

    // 6. NEW BOUNDARY PROTECTION: 
    // If the window shrank, push the furniture back inside the wall
    [gameState.counter, ...gameState.shelves].forEach(obj => {
        if (obj.gridX + obj.w > COLS) obj.gridX = COLS - obj.w;
        if (obj.gridY + obj.h > ROWS) obj.gridY = ROWS - obj.h;
    });

    // RE-SYNC CUSTOMER TARGETS (positions and targets updated in one pass below)
    gameState.customers.forEach(c => {
        // 1. CONVERT PIXELS TO RELATIVE GRID POSITION (Before offX/offY change)
        const relX = (c.x - oldOffX) / oldTile;
        const relY = (c.y - oldOffY) / oldTile;

        // 2. RE-POSITION TO NEW PIXEL COORDINATES
        c.x = offX + (relX * TILE);
        c.y = offY + (relY * TILE);

        // 3. RE-SYNC TARGETS (The destination they are walking toward)
        if (c.state === 'WALKING' || c.state === 'LEAVING') {
            c.tX = (doorXStart + doorXEnd) / 2;
            c.tY = offY - 20;
        } else if (c.state === 'TO_SHELF' || c.state === 'PICKING') {
            const shelf = c.targetShelf || gameState.shelves[0];
            const shelfQueue = gameState.customers
                .filter(cust => (cust.state === 'TO_SHELF' || cust.state === 'PICKING') && cust.targetShelf === shelf)
                .sort((a, b) => a.queueTime - b.queueTime);
            const pos = shelfQueue.indexOf(c);
            const shelfMidY = offY + (shelf.gridY + shelf.h / 2) * TILE;
            c.tX = offX + (shelf.gridX - 0.8) * TILE;
            c.tY = shelfMidY + (pos * 38);
        } else if (c.state === 'WAITING') {
            const payQueue = gameState.customers
                .filter(cust => cust.state === 'WAITING')
                .sort((a, b) => a.queueTime - b.queueTime);
            const pos = payQueue.indexOf(c);
            c.tX = offX + (gameState.counter.gridX + gameState.counter.w) * TILE + 20 + (pos * 40);
            c.tY = offY + (gameState.counter.gridY + 1.5) * TILE;
        }
    });
}

function updateWorker(dt) {
    const w = gameState.worker;
    if (!w || gameState.mode !== 'PLAY') return;

    // ── Movement ──
    if (w.path && w.path.length > 0) {
        const node = w.path[0];
        w.tX = offX + (node.x + 0.5) * TILE;
        w.tY = offY + (node.y + 0.5) * TILE;
        if (Math.hypot(w.x - w.tX, w.y - w.tY) < 8) {
            w.path.shift();
            if (w.path.length === 0) { w.x = w.tX; w.y = w.tY; }
        }
    }
    const dx = w.tX - w.x, dy = w.tY - w.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist > 2) {
        const spd = w.speed * dt;
        const vx = (dx / dist) * spd, vy = (dy / dist) * spd;
        if (!checkCollision(w.x + vx, w.y, true)) w.x += vx;
        if (!checkCollision(w.x, w.y + vy, true)) w.y += vy;
        w.angle = Math.atan2(dy, dx);
        // Save relative position
        w.relX = (w.x - offX) / TILE;
        w.relY = (w.y - offY) / TILE;
    }

    // ── Task: Man Register ──
    if (w.task === 'MANNING_REGISTER') {
        // Target the register zone tile — same tile the player uses (one left of counter, mid-height)
        const regGX = gameState.counter.gridX - 1;
        const regGY = gameState.counter.gridY + Math.floor(gameState.counter.h / 2);
        const regX  = offX + (regGX + 0.5) * TILE;
        const regY  = offY + (regGY + 0.5) * TILE;

        // Only re-path when not already heading there and not already in zone
        if (!w._regPathed && Math.hypot(w.x - regX, w.y - regY) > TILE * 0.8) {
            const startGX = Math.floor((w.x - offX) / TILE);
            const startGY = Math.floor((w.y - offY) / TILE);
            const path = findPath(startGX, startGY, regGX, regGY);
            if (path) { w.path = path; }
            w._regPathed = true; // Don't re-path every frame
        }
        // Reset pathed flag once we've arrived so we re-path if bumped away
        if (Math.hypot(w.x - regX, w.y - regY) < TILE * 0.8) {
            w._regPathed = false;
        }
    } else {
        w._regPathed = false; // Reset when task changes
    }

    // ── Task: Stocking (state machine) ──
    if (w.task === 'STOCKING') {
        if (w.holding === 0) {
            // Find a crate to fetch
            if (gameState.deliveries.length > 0) {
                w.state = 'FETCHING_CRATE';
                const crate = gameState.deliveries[0];
                const crateX = offX + crate.gX * TILE;
                const crateY = offY + crate.gY * TILE;
                w.tX = crateX; w.tY = crateY;
                if (Math.hypot(w.x - crateX, w.y - crateY) < TILE * 1.2) {
                    let space = w.maxHolding - w.holding;
                    let take = Math.min(crate.qty, space);
                    w.holding += take;
                    crate.qty -= take;
                    if (crate.qty <= 0) gameState.deliveries.splice(0, 1);
                    saveGame();
                }
            } else {
                w.state = 'IDLE'; // No crates, chill
            }
        } else {
            // Find the shelf that needs stock most
            w.state = 'STOCKING';
            const shelf = gameState.shelves.reduce((a, b) => (a.max - a.stock) > (b.max - b.stock) ? a : b);
            if (shelf.stock < shelf.max) {
                const sX = offX + (shelf.gridX - 0.8) * TILE;
                const sY = offY + (shelf.gridY + shelf.h / 2) * TILE;
                w.tX = sX; w.tY = sY;
                if (Math.hypot(w.x - sX, w.y - sY) < TILE * 1.5) {
                    const stockAmt = Math.min(w.holding, shelf.max - shelf.stock);
                    shelf.stock += stockAmt;
                    w.holding -= stockAmt;
                    saveGame();
                }
            } else {
                w.holding = 0; // All full
            }
        }
    }
}

function addShelf() {
    if (gameState.money < 100) { alert("Not enough cash! ($100 needed)"); return; }
    gameState.money -= 100;
    // Place new shelf offset from existing ones
    const lastShelf = gameState.shelves[gameState.shelves.length - 1];
    const newGX = Math.min(lastShelf.gridX + 2, COLS - 1);
    const newGY = Math.max(0, Math.min(lastShelf.gridY, ROWS - 4));
    gameState.shelves.push({ gridX: newGX, gridY: newGY, w: 1, h: 4, stock: 0, max: 100, type: 'shelf', isDragging: false });
    saveGame();
    closeModal();
}

function triggerAction() {
    const p = gameState.player;
    
    // 1. DROP LOGIC: If holding something, drop it at player's feet
    if (p.holding > 0) {
        // Convert current pixel spot back to grid for dropping
        gameState.deliveries.push({ 
            gX: (p.x - offX) / TILE, 
            gY: (p.y - offY) / TILE, 
            qty: p.holding 
        });
        p.holding = 0;
        saveGame();
        return;
    }

    // 2. PICKUP LOGIC: Look for boxes near the player
    let pickedUp = false;
    gameState.deliveries.forEach((d, i) => {
        if (pickedUp) return;
        
        // Calculate where the box is in pixels right now
        const crateX = offX + (d.gX * TILE);
        const crateY = offY + (d.gY * TILE);
        const dist = Math.hypot(p.x - crateX, p.y - crateY);
        
        if (dist < TILE && p.holding < p.maxHolding) {
            let space = p.maxHolding - p.holding;
            let take = Math.min(d.qty, space);
            p.holding += take;
            d.qty -= take;
            
            if (d.qty <= 0) gameState.deliveries.splice(i, 1);
            pickedUp = true;
            saveGame();
        }
    });
}

function handleScratch(e) {
    if (!isScratching || !scratchActive) return;
    
    // Prevent scrolling on mobile
    if (e.touches) e.preventDefault(); 

    const rect = sCanvas.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;

    const x = clientX - rect.left;
    const y = clientY - rect.top;

    sCtx.globalCompositeOperation = 'destination-out';
    sCtx.lineWidth = 40; // Fixed size since sizeLvl was undefined
    sCtx.lineCap = 'round';
    sCtx.lineJoin = 'round';

    sCtx.beginPath();
    // Use last coordinates to draw a continuous line
    sCtx.moveTo(lastX || x, lastY || y);
    sCtx.lineTo(x, y);
    sCtx.stroke();

    lastX = x;
    lastY = y;

    // Check for win condition
    if (Math.random() > 0.9) checkScratchWin();
}

function checkScratchWin() {
    // Deduct from whichever stocked shelf the player is standing near
    const p = gameState.player;
    const nearShelf = gameState.shelves.find(s => {
        const shelfZone = { x: offX + (s.gridX - 1) * TILE, y: offY + s.gridY * TILE, w: TILE, h: s.h * TILE };
        return isInZone(p.x, p.y, shelfZone) && s.stock > 0;
    }) || gameState.shelves[0];

    const data = sCtx.getImageData(0,0,280,280).data;
    let trans = 0;
    for(let i=3; i<data.length; i+=4) if(data[i] === 0) trans++;
    
    // Threshold: 60% revealed
    if ((trans / (280*280)) > 0.60) {
        scratchActive = false;
        nearShelf.stock--;
        setTimeout(() => {
            if (currentPendingWin > 0) {
                gameState.money += currentPendingWin;
                alert(`WINNER! You matched symbols and won $${currentPendingWin}!`);
            } else {
                alert("No matches this time. Try again!");
            }
            saveGame();
            closeScratcher();
        }, 500);
    }
}

//1. The A* Pathfinding Logic. This finds the shortest path while treating tiles with furniture as "blocked".
function findPath(startGX, startGY, endGX, endGY) {
    const queue = [[{ x: startGX, y: startGY }]];
    const visited = new Set();
    visited.add(`${startGX},${startGY}`);

    while (queue.length > 0) {
        const path = queue.shift();
        const { x, y } = path[path.length - 1];

        if (x === endGX && y === endGY) return path;

        // Check 4 neighbors
        [[0,1], [0,-1], [1,0], [-1,0]].forEach(([dx, dy]) => {
            const nx = x + dx, ny = y + dy;
            const key = `${nx},${ny}`;

            // 1. Stay in bounds. 2. Not visited. 3. Use your existing checkCollision
            if (nx >= 0 && nx < COLS && ny >= 0 && ny < ROWS && !visited.has(key)) {
                // Convert grid to world pixels to test collision
                if (!checkCollision(offX + nx * TILE + 20, offY + ny * TILE + 20)) {
                    visited.add(key);
                    queue.push([...path, { x: nx, y: ny }]);
                }
            }
        });
    }
    return null;
}

    // 1. GATE: Ignore if tapping the Top Bar or a Button
    if (e.target.closest('#top-bar') || e.target.closest('button')) {
        return; 
    }

    // 2. If the camera was dragged (or a furniture drag just ended), STOP

        Camera.isLocked = false; // Release any furniture lock

    if (gameState.mode === 'BUILD') {
        Camera.dragDistance = 0;
        return;
    }

    // 4. Clean tap in PLAY mode — move the player
    const touch = e.changedTouches[0];
    const worldPos = Camera.screenToWorld(touch.clientX, touch.clientY, canvas);
    let p = gameState.player;

    // Red Box / Pathfinding logic (mirrors mouseup)
    const rx = offX + (gameState.counter.gridX - 1) * TILE;
    const ry = offY + gameState.counter.gridY * TILE;
    
    if (worldPos.x > rx && worldPos.x < rx + TILE && worldPos.y > ry && worldPos.y < ry + (gameState.counter.h * TILE)) {

            Math.floor((p.x - offX) / TILE), 
            Math.floor((p.y - offY) / TILE),
            gameState.counter.gridX - 1, 
            gameState.counter.gridY + 1
        );
    } else {
        p.path = [];
        p.tX = worldPos.x;
        p.tY = worldPos.y;
    }
    
    Camera.dragDistance = 0;
