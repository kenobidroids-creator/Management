<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scratcher Shop Sim</title>
    <style>
        :root { --primary: #2196F3; --accent: #4CAF50; --danger: #f44336; --dark: #1a1a1a; }
        body { margin: 0; overflow: hidden; background: var(--dark); font-family: 'Segoe UI', sans-serif; touch-action: none; }
        
        /* Fixed UI Header */
        #top-bar { 
            position: absolute; top: 0; left: 0; right: 0; height: 60px;
            background: rgba(0,0,0,0.9); display: flex; justify-content: space-around;
            align-items: center; color: white; font-size: 14px; z-index: 10;
        }

        /* Modal / Menu Styling */
        #modal {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; padding: 20px; border-radius: 12px; width: 80%; max-width: 400px;
            z-index: 100; box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        .modal-header { font-weight: bold; font-size: 1.2rem; margin-bottom: 15px; border-bottom: 1px solid #ddd; }
        .shop-item { display: flex; justify-content: space-between; margin: 10px 0; padding: 5px; background: #f9f9f9; border-radius: 4px; }

        /* Bottom Controls */
        #bottom-bar {
            position: absolute; bottom: 0; left: 0; right: 0; height: 70px;
            background: rgba(0,0,0,0.8); display: flex; justify-content: center; align-items: center; gap: 10px;
        }
        .btn { padding: 12px 20px; border: none; border-radius: 8px; color: white; cursor: pointer; font-weight: bold; }
        .btn-shop { background: var(--primary); }
        .btn-build { background: #ff9800; }
        .btn-close { background: var(--danger); width: 100%; margin-top: 10px; }

        canvas { display: block; background: #e0e0e0; }
    </style>
</head>
<body>

<div id="top-bar">
    <div>Cash: <b id="ui-cash">$0</b></div>
    <div>Debt: <b id="ui-loan">$0</b></div>
    <div>Hold: <b id="ui-held">None</b></div>
</div>

<div id="modal">
    <div id="modal-content">
        <div class="modal-header">Bank & Shop</div>
        <div class="shop-item">
            <span>Business Loan (+$5,000)</span>
            <button onclick="takeLoan(5000)" id="loan-btn">Take</button>
        </div>
        <hr>
        <div class="shop-item">
            <span>Scratcher Box (50 units)</span>
            <button onclick="buyStock(150, 50)">$150</button>
        </div>
        <div class="shop-item">
            <span>New Shelf (Max 100)</span>
            <button onclick="enterBuildMode('shelf', 300)">$300</button>
        </div>
    </div>
    <button class="btn btn-close" onclick="closeModal()">Close</button>
</div>

<canvas id="gameCanvas"></canvas>

<div id="bottom-bar">
    <button class="btn btn-shop" onclick="openModal()">OFFICE</button>
    <button class="btn btn-build" onclick="saveGame()">SAVE</button>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let gameState = {
    money: 0,
    loan: 0,
    gameMode: 'PLAY', // PLAY, BUILD
    buildGhost: null,
    shelves: [{ x: 600, y: 150, w: 40, h: 150, stock: 0, max: 100 }],
    deliveryZone: { x: 50, y: 80, w: 80, h: 80 },
    counter: { x: 300, y: 400, w: 150, h: 40 },
    player: { x: 200, y: 200, targetX: 200, targetY: 200, size: 18, speed: 5, holding: null }
};

const keys = {};

// --- Menu Logic ---
function openModal() { document.getElementById('modal').style.display = 'block'; }
function closeModal() { document.getElementById('modal').style.display = 'none'; }

function takeLoan(amt) {
    if (gameState.loan > 0) return alert("Pay your existing loan first!");
    gameState.money += amt;
    gameState.loan = amt;
    updateUI();
}

function buyStock(cost, units) {
    if (gameState.money >= cost && !gameState.player.holding) {
        gameState.money -= cost;
        gameState.player.holding = { type: 'scratchers', qty: units };
        closeModal();
        updateUI();
    } else {
        alert("Need more money or hands are full!");
    }
}

function enterBuildMode(type, cost) {
    if (gameState.money < cost) return alert("Not enough cash!");
    gameState.gameMode = 'BUILD';
    gameState.buildGhost = { type, cost, w: 40, h: 150 };
    closeModal();
}

// --- Game Logic ---
function handleInteraction() {
    let p = gameState.player;

    // Stocking Shelves
    if (p.holding && p.holding.type === 'scratchers') {
        gameState.shelves.forEach(s => {
            if (isNear(p, s)) {
                let space = s.max - s.stock;
                let transfer = Math.min(space, p.holding.qty);
                s.stock += transfer;
                p.holding.qty -= transfer;
                if (p.holding.qty <= 0) p.holding = null;
            }
        });
    }
    updateUI();
}

function isNear(p, obj) {
    return p.x > obj.x - 30 && p.x < obj.x + obj.w + 30 &&
           p.y > obj.y - 30 && p.y < obj.y + obj.h + 30;
}

function updateUI() {
    document.getElementById('ui-cash').innerText = `$${gameState.money}`;
    document.getElementById('ui-loan').innerText = `$${gameState.loan}`;
    document.getElementById('ui-held').innerText = gameState.player.holding ? 
        `${gameState.player.holding.qty} Scr.` : "None";
    document.getElementById('loan-btn').disabled = gameState.loan > 0;
}

// --- Main Loop ---
function init() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    
    canvas.addEventListener('mousedown', (e) => {
        if (gameState.gameMode === 'BUILD') {
            // Place item
            gameState.shelves.push({ 
                x: e.clientX, y: e.clientY, 
                w: gameState.buildGhost.w, h: gameState.buildGhost.h, 
                stock: 0, max: 100 
            });
            gameState.money -= gameState.buildGhost.cost;
            gameState.gameMode = 'PLAY';
            gameState.buildGhost = null;
        } else {
            gameState.player.targetX = e.clientX;
            gameState.player.targetY = e.clientY;
        }
    });

    window.addEventListener('keydown', e => {
        keys[e.key.toLowerCase()] = true;
        if (e.key === 'e') handleInteraction();
    });
    window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

    requestAnimationFrame(tick);
}

function tick() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // Move Player
    let p = gameState.player;
    let dx = p.targetX - p.x;
    let dy = p.targetY - p.y;
    let dist = Math.sqrt(dx*dx + dy*dy);
    if (dist > 5) {
        p.x += (dx/dist) * p.speed;
        p.y += (dy/dist) * p.speed;
    }

    // Draw Store Objects
    ctx.fillStyle = '#8b4513'; ctx.fillRect(50, 80, 80, 80); // Delivery
    ctx.fillStyle = '#333'; ctx.fillRect(gameState.counter.x, gameState.counter.y, gameState.counter.w, gameState.counter.h);

    gameState.shelves.forEach(s => {
        ctx.fillStyle = '#555';
        ctx.fillRect(s.x, s.y, s.w, s.h);
        ctx.fillStyle = 'white';
        ctx.font = '10px Arial';
        ctx.fillText(`${s.stock}/${s.max}`, s.x + 2, s.y + 20);
    });

    // Build Mode Ghost
    if (gameState.gameMode === 'BUILD' && gameState.buildGhost) {
        ctx.globalAlpha = 0.5;
        ctx.fillStyle = 'green';
        ctx.fillRect(p.targetX, p.targetY, gameState.buildGhost.w, gameState.buildGhost.h);
        ctx.globalAlpha = 1.0;
    }

    // Draw Player
    ctx.fillStyle = p.holding ? '#4CAF50' : '#2196F3';
    ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();

    requestAnimationFrame(tick);
}

init();
</script>
</body>
</html>
