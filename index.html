<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scratcher Sim</title>
    <style>
        :root { --primary: #2196F3; --accent: #4CAF50; --danger: #f44336; --dark: #1a1a1a; }
        body { 
    margin: 0; 
    overflow: hidden; 
    background: #111; 
    font-family: 'Segoe UI', sans-serif; 
    touch-action: none; 
    display: flex; 
    flex-direction: column; 
    height: 100dvh; /* Use dynamic viewport height for mobile browsers */
}
#gameCanvas { 
    display: block; 
    background: #1a1a1a; 
    max-width: 100%; 
    max-height: 100%; 
    object-fit: contain; /* Ensures the aspect ratio is maintained */
    margin: auto; 
}
        #top-bar { position: absolute; top: 0; left: 0; right: 0; height: 50px; background: rgba(0,0,0,0.9); display: flex; justify-content: space-around; align-items: center; color: white; font-size: 13px; z-index: 10; border-bottom: 2px solid #444; }
        #bottom-bar { position: absolute; bottom: 0; left: 0; right: 0; height: 70px; background: rgba(0,0,0,0.8); display: flex; justify-content: center; align-items: center; gap: 15px; }
        #build-confirm { display: none; position: absolute; gap: 10px; z-index: 100; pointer-events: auto; }
        .btn { padding: 10px 15px; border: none; border-radius: 8px; color: white; cursor: pointer; font-weight: bold; min-width: 80px; text-align: center; }
        .btn-confirm { background: var(--accent); }
        .btn-cancel { background: var(--danger); }
        .btn-build { background: #e91e63; }
        #modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 20px; border-radius: 12px; width: 85%; max-width: 350px; z-index: 110; }
        canvas { display: block; background: #1a1a1a; box-shadow: 0 0 50px rgba(0,0,0,0.5); }

        /* Mobile optimization to prevent zooming and selection */
body { touch-action: none; -webkit-user-select: none; }
/* Style for the new Action button */
.btn-action { background: #ff9800; border: 2px solid white; }
    </style>
</head>
<body>

<div id="top-bar">
    <div>CASH: <b id="ui-cash" style="color:var(--accent)">$500</b> | HELD: <b id="ui-held" style="color:var(--primary)">0</b></div>
    <div id="mode-text" style="color: #ff9800;">PLAY MODE</div>
</div>

<div id="build-confirm">
    <button class="btn btn-confirm" onclick="confirmPlacement()">✓</button>
    <button class="btn btn-cancel" onclick="clearBuildState()">X</button>
</div>

<div id="modal">
    <h3 style="margin-top:0">Office</h3>
    <button class="btn" style="background:var(--accent); width:100%" onclick="buyStock()">BUY STOCK BOX ($50)</button>
    <button class="btn" style="background:var(--danger); width:100%; margin-top:10px" onclick="resetGame()">RESET DATA</button>
    <button class="btn" style="background:#555; width:100%; margin-top:10px" onclick="closeModal()">CLOSE</button>
</div>

<canvas id="gameCanvas"></canvas>

<div id="bottom-bar">
    <button class="btn btn-build" id="build-toggle" onclick="toggleBuildMode()">BUILD</button>
    <button class="btn btn-action" id="action-btn" onclick="triggerAction()">ACTION</button>
    <button class="btn" style="background:var(--primary)" onclick="openModal()">OFFICE</button>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

window.oncontextmenu = (e) => e.preventDefault();

let TILE = 40;
const COLS = 15;
const ROWS = 12;
let offX = 0, offY = 0;

let lastTime = 0;
let transactionTimer = 0;
let restockTimer = 0;

let gameState = {
    money: 500, mode: 'PLAY',
    player: { 
    x: -100, y: -100, // Start off-screen; resize/load will place correctly
    tX: 0, tY: 0, 
    size: 15, angle: 0, speed: 200, holding: 0, maxHolding: 50 
},
    counter: { gridX: 2, gridY: 5, w: 1, h: 3, type: 'counter' },
    shelves: [{ gridX: 13, gridY: 3, w: 1, h: 4, stock: 50, max: 100, type: 'shelf' }],
    customers: [],
    deliveries: [],
    movingObj: null, isPlaced: false, tempPos: { gX: 0, gY: 0 }, mouse: { x: 0, y: 0 }
};

function getRect(obj) { return { x: offX + obj.gridX * TILE, y: offY + obj.gridY * TILE, w: obj.w * TILE, h: obj.h * TILE }; }
function isInZone(px, py, zone) { return px > zone.x && px < zone.x + zone.w && py > zone.y && py < zone.y + zone.h; }

function checkCollision(nx, ny, isAI = false) {
    const doorMinX = offX + TILE * 1;
    const doorMaxX = offX + TILE * 4;
    // Allow passage through the door area at the top wall
    const isAtDoor = (nx > doorMinX && nx < doorMaxX && ny < offY + 10 && ny > offY - 20);

    if (isAtDoor) return false;

    // Hard wall boundaries based on current offX/offY
    if (nx < offX + 10 || nx > offX + (COLS * TILE) - 10 || ny < offY + 10 || ny > offY + (ROWS * TILE) - 10) {
        return true; 
    }
    
    // Furniture collision
    let collision = false;
    [gameState.counter, ...gameState.shelves].forEach(obj => {
        const r = getRect(obj);
        if (nx + 10 > r.x && nx - 10 < r.x + r.w && ny + 10 > r.y && ny - 10 < r.y + r.h) collision = true;
    });
    return collision;
}

function buyStock() {
    if (gameState.money >= 50) {
        gameState.money -= 50;
        // Spawn relative to the current shop grid
        gameState.deliveries.push({ 
            x: offX + TILE * (1.5 + Math.random() * 2), 
            y: offY - 40, 
            qty: 50 
        });
        saveGame();
    }
}

function spawnCustomer() {
    if (gameState.mode !== 'PLAY') return;
    // Spawn off-screen relative to the current width
    const side = Math.random() > 0.5 ? -150 : canvas.width + 150;
    
    // NEW: Target the door relative to offX
    const doorX = offX + TILE * 2.5; 
    
    gameState.customers.push({
        id: Math.random(), 
        x: side, 
        y: offY - 100, // Spawn above the sidewalk
        tX: doorX, 
        tY: offY - 100, // Walk to the door position outside
        speed: 80 + Math.random() * 40, 
        state: 'WALKING', 
        basket: 0, timer: 0, queueTime: Date.now(),
        color: `hsl(${Math.random() * 360}, 65%, 60%)`
    });
}

function updateCustomers(dt) {
    if (gameState.mode !== 'PLAY') return;

    // Line management for both shelf and register
    const shelfQueue = gameState.customers
        .filter(c => c.state === 'TO_SHELF' || c.state === 'PICKING')
        .sort((a,b) => a.queueTime - b.queueTime);

    const payQueue = gameState.customers
        .filter(c => c.state === 'WAITING')
        .sort((a,b) => a.queueTime - b.queueTime);
    
    const regZone = {
        x: offX + (gameState.counter.gridX - 1) * TILE,
        y: offY + gameState.counter.gridY * TILE,
        w: TILE, h: gameState.counter.h * TILE
    };

    if (payQueue.length > 0 && isInZone(gameState.player.x, gameState.player.y, regZone)) {
        const firstC = payQueue[0];
        if (Math.abs(firstC.x - firstC.tX) < 20) {
            transactionTimer += dt;
            if (transactionTimer >= 1.5) {
                gameState.money += firstC.basket * 10;
                firstC.basket = 0; firstC.state = 'LEAVING';
                firstC.tX = offX + TILE * 2.5; firstC.tY = offY - 10;
                transactionTimer = 0; saveGame();
            }
        }
    } else { transactionTimer = 0; }

    gameState.customers.forEach((c, index) => {
        if (c.state === 'WALKING') {
    // Check if they reached the door x-position
    if (Math.abs(c.x - c.tX) < 10) { 
        c.state = 'ENTERING'; 
        c.tY = offY + TILE * 1.5; // Target a spot INSIDE the shop floor
    }
}
        else if (c.state === 'ENTERING' && Math.abs(c.y - c.tY) < 10) {
            c.state = 'TO_SHELF';
            c.queueTime = Date.now();
        } 
        else if (c.state === 'TO_SHELF') {
    const pos = shelfQueue.indexOf(c);
    const targetShelf = gameState.shelves[0]; // Targets the first shelf
    
    // Dynamic standing spot: 1 tile to the left of the shelf, aligned with the top of it
    // Then adds a 35px gap for each person in line behind the first
    c.tX = offX + (targetShelf.gridX - 1) * TILE + 20;
    c.tY = offY + (targetShelf.gridY * TILE) + 20 + (pos * 35);
    
    // Only the person at index 0 (front of line) can start picking
    if (pos === 0 && Math.abs(c.x - c.tX) < 10 && Math.abs(c.y - c.tY) < 10) {
        c.state = 'PICKING'; 
        c.timer = 1.0 + Math.random();
    }
} 
        else if (c.state === 'PICKING') {
            c.timer -= dt;
            if (c.timer <= 0) {
                const s = gameState.shelves[0];
                const grab = Math.random() < 0.9 ? Math.min(s.stock, Math.floor(Math.random() * 3) + 1) : 0;
                if (grab > 0) {
                    s.stock -= grab; c.basket = grab;
                    c.state = 'WAITING'; c.queueTime = Date.now();
                    saveGame();
                } else {
                    c.state = 'LEAVING';
                    c.tX = offX + TILE * 2.5; c.tY = offY + TILE;
                }
            }
        } 
        else if (c.state === 'WAITING') {
            const pos = payQueue.indexOf(c);
            c.tX = offX + (gameState.counter.gridX + gameState.counter.w) * TILE + 35 + (pos * 45);
            c.tY = offY + (gameState.counter.gridY + 1.5) * TILE;
        } 
        else if (c.state === 'LEAVING') {
            if (c.y > offY - 30) { c.tX = offX + TILE * 2.5; c.tY = offY - 60; }
            else { c.tX = (c.id > 0.5) ? -300 : canvas.width + 300; }
        }

        let dx = c.tX - c.x, dy = c.tY - c.y;
        let dist = Math.sqrt(dx*dx + dy*dy);
        if (dist > 3) {
            let vx = (dx/dist) * c.speed * dt, vy = (dy/dist) * c.speed * dt;
            if (!checkCollision(c.x + vx, c.y, true)) c.x += vx;
            if (!checkCollision(c.x, c.y + vy, true)) c.y += vy;
        }

        if ((c.x < -250 || c.x > canvas.width + 250) && c.state === 'LEAVING') {
            gameState.customers.splice(index, 1);
        }
    });
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    let p = gameState.player;
    
    // Environment
    // Road and sidewalk
    ctx.fillStyle = "#333"; ctx.fillRect(0, 0, canvas.width, offY - 80); 
    ctx.fillStyle = "#555"; ctx.fillRect(0, offY - 80, canvas.width, 80); 
    ctx.strokeStyle = "#444";
    for(let i=0; i<canvas.width; i+=100) { ctx.beginPath(); ctx.moveTo(i, offY-80); ctx.lineTo(i, offY); ctx.stroke(); }
        // Floor below
    ctx.fillStyle = "#1e1e1e"; ctx.fillRect(offX, offY, COLS*TILE, ROWS*TILE);
    
    if (gameState.mode === 'BUILD') {
        ctx.strokeStyle = "#333";
        for(let i=0; i<=COLS; i++) { ctx.beginPath(); ctx.moveTo(offX+i*TILE, offY); ctx.lineTo(offX+i*TILE, offY+ROWS*TILE); ctx.stroke(); }
        for(let j=0; j<=ROWS; j++) { ctx.beginPath(); ctx.moveTo(offX, offY+j*TILE); ctx.lineTo(offX+COLS*TILE, offY+j*TILE); ctx.stroke(); }
    }

    // PERMANENT RED DOTTED HITBOX
    ctx.setLineDash([5, 5]); ctx.strokeStyle = "rgba(255, 0, 0, 0.7)"; ctx.lineWidth = 2;
    ctx.strokeRect(offX + (gameState.counter.gridX - 1) * TILE + 5, offY + gameState.counter.gridY * TILE + 5, TILE - 10, (gameState.counter.h * TILE) - 10);
    ctx.setLineDash([]);

    ctx.strokeStyle = "white"; ctx.lineWidth = 4; ctx.strokeRect(offX, offY, COLS*TILE, ROWS*TILE);
    ctx.fillStyle = "#1e1e1e"; ctx.fillRect(offX + TILE * 1, offY - 8, TILE * 3, 16);

    gameState.deliveries.forEach(d => {
    // 1. Draw the box base
    ctx.fillStyle = "#d2b48c"; ctx.fillRect(d.x - 10, d.y - 10, 20, 20);
    ctx.strokeStyle = "#8b4513"; ctx.strokeRect(d.x - 10, d.y - 10, 20, 20);
    
    // 2. Draw the proximity indicator circle
    // ctx.strokeStyle = Math.hypot(p.x - d.x, p.y - d.y) < 50 ? "lime" : "rgba(255,255,255,0.2)";
    // ctx.beginPath(); ctx.arc(d.x, d.y, 25, 0, Math.PI * 2); ctx.stroke();

    // 3. NEW: Draw the quantity overlay
    ctx.fillStyle = "white";
    ctx.font = "bold 10px Arial";
    ctx.textAlign = "center";
    // Draw text slightly above the box so it doesn't get covered by the player
    ctx.fillText(d.qty, d.x, d.y + 4); 
    ctx.fillStyle = "black";
    ctx.fillText(d.qty, d.x + 1, d.y + 5); // Shadow
    ctx.fillStyle = "white";
    ctx.fillText(d.qty, d.x, d.y + 4);     // Main text
});

    [gameState.counter, ...gameState.shelves].forEach(obj => {
        if (gameState.movingObj === obj) return;
        ctx.fillStyle = "#555"; ctx.fillRect(offX + obj.gridX * TILE, offY + obj.gridY * TILE, obj.w * TILE, obj.h * TILE);
        if (obj.type === 'shelf') {
            ctx.fillStyle = "white"; ctx.font = "10px Arial"; ctx.textAlign = "left";
            ctx.fillText(`STOCK: ${obj.stock}`, offX + obj.gridX * TILE, offY + obj.gridY * TILE - 5);
        }
    });

    if (gameState.movingObj) {
        let gx = gameState.isPlaced ? gameState.tempPos.gX : Math.floor((gameState.mouse.x - offX) / TILE);
        let gy = gameState.isPlaced ? gameState.tempPos.gY : Math.floor((gameState.mouse.y - offY) / TILE);
        ctx.globalAlpha = 0.4;
        const blocksDoor = (gx < 5 && gy < 3);
        const oob = (gx < 0 || gx + gameState.movingObj.w > COLS || gy < 0 || gy + gameState.movingObj.h > ROWS || blocksDoor);
        ctx.fillStyle = oob ? "red" : "cyan";
        ctx.fillRect(offX + gx * TILE, offY + gy * TILE, gameState.movingObj.w * TILE, gameState.movingObj.h * TILE);
        ctx.globalAlpha = 1.0;
    }

    gameState.customers.forEach(c => {
        ctx.fillStyle = c.color; ctx.beginPath(); ctx.arc(c.x, c.y, 14, 0, Math.PI*2); ctx.fill();
        if (c.basket > 0) { ctx.fillStyle = "white"; ctx.font = "bold 12px Arial"; ctx.textAlign = "center"; ctx.fillText(c.basket, c.x, c.y + 4); }
    });

    ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.angle);
    ctx.fillStyle = '#2196F3'; ctx.beginPath(); ctx.arc(0,0,p.size,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = 'white'; ctx.beginPath(); ctx.arc(7,0,4,0,Math.PI*2); ctx.fill();
    ctx.restore();
    if (p.holding > 0) { 
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(p.angle);
    
    // Draw the box in front of the player
    ctx.fillStyle = "#d2b48c"; 
    ctx.fillRect(10, -8, 16, 16); 
    ctx.strokeStyle = "#8b4513";
    ctx.strokeRect(10, -8, 16, 16);
    
    // NEW: Draw the quantity number on the held box
    ctx.fillStyle = "white";
    ctx.font = "bold 9px Arial";
    ctx.textAlign = "center";
    // We rotate the text back so it stays upright regardless of player direction
    ctx.rotate(-p.angle); 
    // Position adjusted to stay centered on the box relative to player offset
    ctx.fillText(p.holding, 18 * Math.cos(p.angle), 18 * Math.sin(p.angle) + 4);
    
    ctx.restore();
}

    if (transactionTimer > 0) {
        ctx.fillStyle = "rgba(0,0,0,0.5)"; ctx.fillRect(p.x - 20, p.y - 30, 40, 6);
        ctx.fillStyle = "#4CAF50"; ctx.fillRect(p.x - 20, p.y - 30, (transactionTimer/1.5) * 40, 6);
    }
    
    document.getElementById('ui-cash').innerText = `$${gameState.money}`;
    document.getElementById('ui-held').innerText = p.holding;
}

function loop(timestamp) {
    let dt = (timestamp - lastTime) / 1000;
    if (dt > 0.1) dt = 0.1; lastTime = timestamp;
    let p = gameState.player;
    if (gameState.mode === 'PLAY') {
        let dx = p.tX - p.x, dy = p.tY - p.y;
        let dist = Math.sqrt(dx*dx + dy*dy);
        if (dist > 5) {
            let vx = (dx/dist) * p.speed * dt, vy = (dy/dist) * p.speed * dt;
            if (!checkCollision(p.x + vx, p.y)) p.x += vx;
            if (!checkCollision(p.x, p.y + vy)) p.y += vy;
            p.angle = Math.atan2(dy, dx);
        }
        
        const shelfZone = { x: offX + (gameState.shelves[0].gridX - 1) * TILE, y: offY + gameState.shelves[0].gridY * TILE, w: TILE, h: gameState.shelves[0].h * TILE };
        if (p.holding > 0 && isInZone(p.x, p.y, shelfZone)) {
    restockTimer += dt;
    if (restockTimer > 0.05 && gameState.shelves[0].stock < gameState.shelves[0].max) {
        gameState.shelves[0].stock++; 
        p.holding--; 
        restockTimer = 0;
        if (p.holding === 0 || gameState.shelves[0].stock >= gameState.shelves[0].max) saveGame();
    }
}
    }
    updateCustomers(dt); draw();
    requestAnimationFrame(loop);
}

// Utility and Handlers
setInterval(() => { if(gameState.customers.length < 8) spawnCustomer(); }, 3500);
function saveGame() {
    const savedDeliveries = gameState.deliveries.map(d => ({
        gridX: (d.x - offX) / TILE,
        gridY: (d.y - offY) / TILE,
        qty: d.qty
    }));

    localStorage.setItem('scratcherSimData', JSON.stringify({
        money: gameState.money, 
        counter: gameState.counter, 
        shelves: gameState.shelves, 
        deliveries: savedDeliveries,
        playerGrid: {
            gx: (gameState.player.x - offX) / TILE,
            gy: (gameState.player.y - offY) / TILE
        }
    }));
}

function loadGame() {
    const saved = localStorage.getItem('scratcherSimData');
    if (saved) {
        const loaded = JSON.parse(saved);
        gameState.money = loaded.money ?? 500;
        if (loaded.counter) gameState.counter = loaded.counter;
        if (loaded.shelves) gameState.shelves = loaded.shelves;
        
        if (loaded.deliveries) {
            gameState.deliveries = loaded.deliveries.map(d => ({
                x: offX + (d.gridX * TILE),
                y: offY + (d.gridY * TILE),
                qty: d.qty
            }));
        }

        if (loaded.playerGrid) {
            gameState.player.x = offX + (loaded.playerGrid.gx * TILE);
            gameState.player.y = offY + (loaded.playerGrid.gy * TILE);
            gameState.player.tX = gameState.player.x;
            gameState.player.tY = gameState.player.y;
        }
    }
}

function resize() {
    // 1. Calculate TILE size to fit the 15-column room in the window
    const availableWidth = window.innerWidth - 40; // 40px margin
    TILE = Math.max(20, Math.min(40, Math.floor(availableWidth / COLS)));
    
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    // 2. Center the shop grid
    offX = (canvas.width - (COLS * TILE)) / 2;
    offY = (canvas.height - (ROWS * TILE)) / 2;

    // 3. SAFE SPAWN: Always place player behind the counter relative to current grid
    const p = gameState.player;
    p.x = offX + (gameState.counter.gridX - 0.5) * TILE;
    p.y = offY + (gameState.counter.gridY + 1.5) * TILE;
    p.tX = p.x; 
    p.tY = p.y;

    // 4. Update active customer targets so they find the door
    gameState.customers.forEach(c => {
        if (c.state === 'WALKING' || c.state === 'ENTERING') {
            c.tX = offX + TILE * 2.5; 
        }
    });
}

function toggleBuildMode() { gameState.mode = gameState.mode === 'PLAY' ? 'BUILD' : 'PLAY'; document.getElementById('mode-text').innerText = gameState.mode + " MODE"; if(gameState.mode === 'PLAY') clearBuildState(); }
function confirmPlacement() { if(gameState.movingObj){ gameState.movingObj.gridX = gameState.tempPos.gX; gameState.movingObj.gridY = gameState.tempPos.gY; } clearBuildState(); saveGame(); }
function clearBuildState() { gameState.movingObj = null; gameState.isPlaced = false; document.getElementById('build-confirm').style.display = 'none'; }
function openModal() { document.getElementById('modal').style.display = 'block'; }
function closeModal() { document.getElementById('modal').style.display = 'none'; }
function resetGame() { if(confirm("Clear All?")) { localStorage.removeItem('scratcherSimData'); location.reload(); } }

canvas.addEventListener('mousemove', (e) => { const rect = canvas.getBoundingClientRect(); gameState.mouse.x = e.clientX - rect.left; gameState.mouse.y = e.clientY - rect.top; });
canvas.addEventListener('mousedown', (e) => {
    const rect = canvas.getBoundingClientRect();
    
    // Calculate the scale between the CSS size and the internal canvas size
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    
    // Apply the scale to the mouse coordinates
    const mx = (e.clientX - rect.left) * scaleX;
    const my = (e.clientY - rect.top) * scaleY;
    
    const gX = Math.floor((mx - offX) / TILE);
    const gY = Math.floor((my - offY) / TILE);
    const p = gameState.player;

    if (e.button === 2) { 
        triggerAction(); 
        return;
    }

    if (e.button === 0) {
        if (gameState.mode === 'BUILD') {
            // Build logic remains the same, but uses corrected mx/my
            if (!gameState.movingObj) {
                if (gX === gameState.counter.gridX && gY >= gameState.counter.gridY && gY < gameState.counter.gridY + gameState.counter.h) gameState.movingObj = gameState.counter;
                gameState.shelves.forEach(s => { if (gX === s.gridX && gY >= s.gridY && gY < s.gridY + s.h) gameState.movingObj = s; });
            } else if (!gameState.isPlaced) {
                if (gX >= 0 && gX + gameState.movingObj.w <= COLS && gY >= 0 && gY + gameState.movingObj.h <= ROWS && !(gX < 5 && gY < 3)) {
                    gameState.tempPos = { gX, gY }; gameState.isPlaced = true;
                    const ui = document.getElementById('build-confirm');
                    ui.style.display = 'flex'; 
                    ui.style.left = (e.clientX) + 'px'; // UI follows raw mouse
                    ui.style.top = (e.clientY - 50) + 'px';
                }
            }
        } else { 
            p.tX = mx; 
            p.tY = my; 
        }
    }
});

loadGame(); resize();
requestAnimationFrame(loop);

function triggerAction() {
    const p = gameState.player;
    
    // 1. DROP LOGIC: If holding something, drop it at player's feet
    if (p.holding > 0) {
        gameState.deliveries.push({ x: p.x, y: p.y, qty: p.holding });
        p.holding = 0;
        saveGame();
        return;
    }

    // 2. PICKUP LOGIC: Look for boxes near the player
    let pickedUp = false;
    gameState.deliveries.forEach((d, i) => {
        if (pickedUp) return; // Only pick up one box at a time
        
        const dist = Math.hypot(p.x - d.x, p.y - d.y);
        
        // Short proximity check: Must be within 50 pixels
        if (dist < 50 && p.holding < p.maxHolding) {
            let space = p.maxHolding - p.holding;
            let take = Math.min(d.qty, space);
            p.holding += take;
            d.qty -= take;
            
            if (d.qty <= 0) gameState.deliveries.splice(i, 1);
            pickedUp = true;
            saveGame();
        }
    });
}

// Handle single-touch for movement and multi-touch for action
canvas.addEventListener('touchstart', (e) => {
    e.preventDefault();
    const rect = canvas.getBoundingClientRect();
    const touch = e.touches[0];
    const p = gameState.player;
    
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    
    const mx = (touch.clientX - rect.left) * scaleX;
    const my = (touch.clientY - rect.top) * scaleY;

    if (e.touches.length > 1) {
        triggerAction();
    } else {
        p.tX = mx;
        p.tY = my;
    }
}, { passive: false });


// Refresh logic: Only reloads if the width changes (avoids mobile menu bar issues)
let lastWidth = window.innerWidth;
window.addEventListener('resize', () => {
    if (window.innerWidth !== lastWidth) {
        location.reload(); 
    }
});
</script>
